name: CI

on : 
  push: 
    branches:
      - master
    pull_request:
        branches:
         - master

jobs: 
  tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.Js ${{ matrix.node-version }}
        uses: actions/steps-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run : npm test