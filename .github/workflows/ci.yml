name: CI

on : 
  push: 
    branches:
      - master
    pull_request:
        branches:
         - master

  jobs: 
    tests:
      runs-on: ubuntu-latest
      strategy:
        matrix:
          node-version: [20.x]
        steps:
          - use : actions/checkout@v4
          - name: Use NodeJs ${{ matrix.node-version }}
            users: actions/steps-node@v4
            with:
              node-version: ${{ matrix.node-version }}
              cache: npm
          - run : npm i
          - run : npm test