name: CI/CD Pipeline with Tests

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
      
      # - name: Debug environment variables
      #   run: |
      #       echo "JWT_SECRET length: ${#JWT_SECRET}"  # Affiche la longueur (doit être >= 32)
      #       if [ ${#JWT_SECRET} -lt 32 ]; then
      #         echo "❌ JWT_SECRET est trop court ou non défini !"
      #         exit 1
      #       else
      #         echo "✅ JWT_SECRET est valide (longueur: ${#JWT_SECRET})"
      #       fi
        env:
            JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Run unit tests
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}      # Injecte le secret
          MONGODB_URI: ${{ secrets.MONGODB_URI }}    # Injecte l'URI MongoDB
          NODE_ENV: test                              # Définit l'environnement

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: nailsmith78/jlarpy:latest

